services:
  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:4173"
    depends_on:
      - api

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MONGO_URI=mongodb://mongo:27017/churn_platform
      - ML_API_URL=http://ml-api:8001
      - ONBOARDING_UPLOADS_DIR=/srv/churn-platform/storage/onboarding
      - ML_TRAINING_SERVICE_DIR=/srv/churn-platform/services/ml-training
      - ML_TRAINING_SCRIPT_PATH=/srv/churn-platform/services/ml-training/src/pipelines/train_custom_tenant_pipeline.py
      - ML_TRAINING_ARTIFACTS_DIR=/srv/churn-platform/storage/training-artifacts
    volumes:
      - onboarding_storage:/srv/churn-platform/storage/onboarding
      - training_artifacts:/srv/churn-platform/storage/training-artifacts
      - ./services/ml-training:/srv/churn-platform/services/ml-training:ro
      - ./ibm:/srv/churn-platform/ibm:ro
    depends_on:
      - ml-api
      - mongo

  ml-api:
    build: ./services/ml-api
    ports:
      - "8001:8001"
    volumes:
      - training_artifacts:/srv/churn-platform/storage/training-artifacts

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  onboarding_storage:
  training_artifacts:
